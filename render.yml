services:
  - type: web
    name: ai-job-matcher-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: Backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai_job_matcher_db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: ai-job-matcher-frontend
    runtime: node
    rootDir: Frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-job-matcher-backend.onrender.com

  - type: pserv
    name: ai_job_matcher_db
    plan: free
    ipAllowList: []
    postgreSQLVersion: "15"